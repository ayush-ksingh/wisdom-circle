<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIT Consultancy | Wisdom Circle</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">

  <div class="dashboard-wrapper">
    
    <!-- Top Navigation Header -->
    <header class="main-header">
      <div class="header-container">
        
        <!-- Logo System -->
        <div class="brand">
          <div class="brand-icon">
            <!-- Academic Cap SVG representation -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path d="M12 4L2 9L12 14L22 9L12 4Z" fill="white"/>
               <path d="M5 10.5V15C5 15 8 18 12 18C16 18 19 15 19 15V10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-title">IIT Consultancy</span>
            <span class="brand-subtitle">By IITians, For Aspirants</span>
          </div>
        </div>

        <!-- Navigation Links -->
        <nav class="centered-nav">
          <a href="#" class="nav-link active">Home</a>
          <a href="#" class="nav-link">Our Team</a>
          <a href="#" class="nav-link">Services</a>
          <a href="#" class="nav-link">Contact</a>
        </nav>

        <!-- CTA Action -->
        <a href="#" class="btn-primary-blue">Book Consultation</a>

      </div>
    </header>

    <!-- Main Content Area -->
    <main class="hero-section">
      <div class="hero-content fade-in">
        <h1 class="hero-heading">Expert Guidance from Top IITians</h1>
        <p class="hero-subtext">Get personalized mentorship from 20+ experienced IITian consultants representing 15 premier IITs across India</p>
      </div>

      <!-- Network Map Section -->
      <section class="network-section slide-up">
        <h3 class="network-title">Our Network Across India</h3>
        
        <div class="map-container">
          <!-- Abstract SVG representation of network distribution map (Indian Subcontinent approx.) -->
          <svg viewBox="0 0 400 500" class="india-map" xmlns="http://www.w3.org/2000/svg">
            <!-- Map Boundary Path -->
            <path class="map-fill" d="M190,50 Q140,80 120,150 Q100,250 120,380 C130,420 180,480 200,480 C220,480 260,420 270,380 Q300,250 250,150 Q230,80 190,50 Z" />
            <!-- Eastern Region Blob -->
            <path class="map-fill" d="M300,220 C280,240 280,280 300,300 C330,300 350,260 330,220 Z" />

            <!-- Animated Red Map Ping Coordinates -->
            <!-- North -->
            <g class="ping"><circle cx="170" cy="90" r="5" fill="#EF4444" stroke="white" stroke-width="2"/><circle class="pulse" cx="170" cy="90" r="5" fill="none" stroke="#EF4444" stroke-width="1.5"/></g>
            <g class="ping drop-1"><circle cx="190" cy="70" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            <g class="ping drop-2"><circle cx="160" cy="110" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            
            <!-- Core India -->
            <g class="ping drop-3"><circle cx="180" cy="180" r="5" fill="#EF4444" stroke="white" stroke-width="2"/><circle class="pulse" cx="180" cy="180" r="5" fill="none" stroke="#EF4444" stroke-width="1.5"/></g>
            <g class="ping drop-4"><circle cx="120" cy="220" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            <g class="ping drop-1"><circle cx="210" cy="250" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            
            <!-- Eastern Pins -->
            <g class="ping drop-2"><circle cx="310" cy="240" r="5" fill="#EF4444" stroke="white" stroke-width="2"/><circle class="pulse" cx="310" cy="240" r="5" fill="none" stroke="#EF4444" stroke-width="1.5"/></g>
            <g class="ping"><circle cx="340" cy="210" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            
            <!-- Center links -->
            <g class="ping drop-3"><circle cx="280" cy="210" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            <g class="ping drop-4"><circle cx="250" cy="210" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            <g class="ping drop-2"><circle cx="130" cy="270" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            
            <!-- Southern Points -->
            <g class="ping drop-1"><circle cx="190" cy="340" r="5" fill="#EF4444" stroke="white" stroke-width="2"/></g>
            <g class="ping drop-3"><circle cx="195" cy="420" r="5" fill="#EF4444" stroke="white" stroke-width="2"/><circle class="pulse" cx="195" cy="420" r="5" fill="none" stroke="#EF4444" stroke-width="1.5"/></g>
          </svg>
        </div>
      </section>
      
    </main>
  </div>

</body>
</html>
